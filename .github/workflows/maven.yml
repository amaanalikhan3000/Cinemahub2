name: Java CI with Maven

on:
  push:
    branches: [ "DEV-MAIN" ]
  # Uncomment the pull_request block if you want this workflow to run on pull requests as well.
  # pull_request:
  #   branches: [ "DEV-MAIN" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Define services required for the job. This will spin up a MySQL Docker container
    # that your application can connect to during the workflow execution.
    services:
      mysql:
        image: mysql:8.0 # Use a specific MySQL version. mysql:8.0 is a good default.
        env:
          # These environment variables are used by the MySQL container to initialize the database.
          # They create the specified database and user upon container startup.
          # IMPORTANT: Store these values as GitHub Secrets for security.
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }} # Root password for the MySQL server
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE_NAME }} # The name of the database for your application
          MYSQL_USER: ${{ secrets.MYSQL_USER }} # The username your application will use to connect
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }} # The password for the application user
        ports:
          # Map the container's MySQL port (3306) to the host's port (3306).
          # This allows your Spring Boot application to connect to 'localhost:3306'.
          - 3306:3306
        options: >- # Health check to ensure MySQL is fully ready before the job proceeds.
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER} -p${MYSQL_PASSWORD}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    # Environment variables to be passed to your Java application during the build and test steps.
    # These override any values in application.properties/yml during the workflow run.
    env:
      # Ensure your MYSQL_URL secret is configured to point to 'localhost'
      # e.g., jdbc:mysql://localhost:3306/your_database_name?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_URL: ${{ secrets.MYSQL_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.MYSQL_USER }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      # Other application-specific environment variables
      SPRING_REDIS_HOST: ${{ secrets.REDIS_HOST }}
      SPRING_REDIS_PORT: ${{ secrets.REDIS_PORT }}
      SPRING_MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      SPRING_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Caches Maven dependencies to speed up builds

    # This step explicitly waits for the MySQL service to be accessible on port 3306.
    # This helps prevent "Connection refused" errors due to race conditions where
    # the application starts before the database is fully initialized.
    - name: Wait for MySQL to be ready
      run: |
        echo "Waiting for MySQL to start and accept connections..."
        for i in $(seq 1 60); do # Try for up to 60 seconds (60 * 1 second sleep)
          # Use netcat (nc) to check if port 3306 on localhost is open and listening.
          if nc -z localhost 3306; then
            echo "MySQL is ready after $i seconds!"
            exit 0 # Exit successfully if connection is established
          fi
          echo "Still waiting for MySQL... ($i/60)"
          sleep 1 # Wait for 1 second before retrying
        done
        echo "MySQL did not become ready in time. Exiting workflow."
        exit 1 # Exit with failure if MySQL doesn't become ready

    - name: Build with Maven
      run: mvn -B package --file pom.xml # Builds the project and runs tests

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
      # Submits dependency information for GitHub's dependency graph feature
